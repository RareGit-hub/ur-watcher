name: JKK Property Watcher

on:
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.50.0

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium

      - name: Install Playwright system deps (cache miss only)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install-deps chromium

      - name: Run JKK watcher
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID:       ${{ secrets.LINE_USER_ID }}
        run: python jkk_watcher.py

      - name: Commit updated state
        run: |
          git config user.name  "ur-watcher-bot"
          git config user.email "actions@github.com"
          git add jkk_seen.json
          git diff --staged --quiet || (git commit -m "chore: update jkk_seen [skip ci]" && git pull --rebase && git push)
