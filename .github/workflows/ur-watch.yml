name: UR Property Watcher

on:
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Enable debug mode (saves screenshot + HTML)'
        type: boolean
        default: false

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-1.50.0

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Run watcher
        env:
          GMAIL_ADDRESS:      ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:       ${{ secrets.NOTIFY_EMAIL }}
          LINE_CHANNEL_TOKEN: ${{ secrets.LINE_CHANNEL_TOKEN }}
          LINE_USER_ID:       ${{ secrets.LINE_USER_ID }}
          DEBUG_MODE:         ${{ github.event.inputs.debug_mode || 'false' }}
        run: python ur_watcher.py

      - name: Upload debug files
        if: ${{ github.event.inputs.debug_mode == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: debug-output
          path: |
            debug_regular.png
            debug_regular.html
            debug_tokubetsu.png
            debug_tokubetsu.html

      - name: Commit updated state
        run: |
          git config user.name  "ur-watcher-bot"
          git config user.email "actions@github.com"
          git add seen_ids.json
          git diff --staged --quiet || (git commit -m "chore: update seen_ids [skip ci]" && git pull --rebase && git push)
